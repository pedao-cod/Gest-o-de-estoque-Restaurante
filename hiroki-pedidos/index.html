<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hiroki Sushi Bar — Controle de Pedidos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ── HEADER ──────────────────────────────────────── -->
    <header>
      <div class="logo-mark">
        <!-- Simplified Hiroki-style H mark in SVG -->
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="4" width="6" height="28" rx="1" fill="#0a0a0a" />
          <rect x="26" y="4" width="6" height="28" rx="1" fill="#0a0a0a" />
          <rect x="10" y="15" width="16" height="5" rx="0.5" fill="#0a0a0a" />
        </svg>
      </div>
      <div class="header-text">
        <h1>Hiroki</h1>
        <span>Controle de Estoque</span>
      </div>
      <div class="header-badge no-print">Interno</div>
    </header>

    <!-- ── TABS ────────────────────────────────────────── -->
    <div class="tabs-wrap no-print">
      <button class="tab-btn active" data-tab="cozinha">
        <span class="tab-icon">🍳</span> Cozinha
      </button>
      <button class="tab-btn" data-tab="bar">
        <span class="tab-icon">🍶</span> Bar
      </button>
      <button class="tab-btn" data-tab="sushi">
        <span class="tab-icon">🍣</span> Sushi
      </button>
      <button class="tab-btn" data-tab="limpeza">
        <span class="tab-icon">🧹</span> Limpeza
      </button>
    </div>

    <!-- ── MAIN ─────────────────────────────────────────── -->
    <main id="main-content" class="no-print"></main>

    <!-- ── BOTTOM BAR ──────────────────────────────────── -->
    <div class="bottom-bar no-print">
      <button
        class="btn-clear"
        id="btn-clear-all"
        title="Zerar todas as quantidades"
      >
        ↺ Zerar
      </button>
      <button class="btn-pdf" id="btn-generate-pdf">
        <span>📋</span> Gerar Pedido PDF
      </button>
    </div>

    <!-- ── MODAL ───────────────────────────────────────── -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <h3 id="modal-title">Novo Item</h3>
        <div class="form-group">
          <label>Nome do Item</label>
          <input
            type="text"
            id="modal-name"
            placeholder="Ex: Arroz Japonês"
            autocomplete="off"
          />
        </div>
        <div class="form-group">
          <label>Unidade</label>
          <select id="modal-unit">
            <option value="kg">kg</option>
            <option value="g">g</option>
            <option value="L">L</option>
            <option value="ml">ml</option>
            <option value="un">un</option>
            <option value="cx">cx</option>
            <option value="pct">pct</option>
            <option value="fd">fd</option>
            <option value="bd">bd</option>
            <option value="galão">galão</option>
          </select>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" id="modal-cancel">Cancelar</button>
          <button class="btn-confirm" id="modal-confirm">Salvar</button>
        </div>
      </div>
    </div>

    <!-- ── TOAST ───────────────────────────────────────── -->
    <div class="toast" id="toast"></div>

    <!-- ── PRINT AREA ──────────────────────────────────── -->
    <div id="print-area"></div>

    <script src="script.js" defer></script>
  </body>
</html>
